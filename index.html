<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentence Scramble: Delta's Challenge</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.19.3/package/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg-color: #ffffff; --text-color: #2c3e50;
            --primary-color: #27ae60; --secondary-color: #81c784;
            --accent-color: #a1887f; --hover-bg: #e8f5e9;
            --box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            --font-family: "Times New Roman", "PMingLiu", "新細明體", serif;
            --title-graphic: none; --card-border: 1px solid #e0e0e0;
        }
        /* --- 優化後的 Cyberpunk 夜間模式配色 --- */
        body.dark-mode {
            --bg-color: #121212; 
            --text-color: #e0e0e0;
            --primary-color: #b0bec5; /* 改為淺灰色作為主色調 */
            --secondary-color: #455a64; /* 深灰色 */
            --accent-color: #1a2a3a; /* 方塊底色：午夜深藍 */
            --hover-bg: #1e1e1e;
            --box-shadow: 0 0 15px rgba(255, 255, 255, 0.05);
            --title-graphic: linear-gradient(90deg, #cfd8dc, #607d8b, #cfd8dc);
            --card-border: 1px solid rgba(255, 255, 255, 0.1);
        }
        body {
            font-family: var(--font-family); background-color: var(--bg-color);
            color: var(--text-color); transition: all 0.5s ease;
            display: flex; flex-direction: column; align-items: center;
            padding: 20px; margin: 0; min-height: 100vh;
        }
        #game-container {
            background-color: var(--bg-color); padding: 30px; border-radius: 15px;
            box-shadow: var(--box-shadow); border: var(--card-border);
            width: 95%; max-width: 800px; text-align: center; position: relative;
        }
        #theme-toggle { position: fixed; top: 20px; right: 20px; background: none; border: none; cursor: pointer; z-index: 1000; padding: 10px; border-radius: 50%; }
        #theme-toggle svg { fill: var(--text-color); transition: fill 0.3s; }
        .sun-icon { display: none; }
        body.dark-mode .sun-icon { display: block; }
        body.dark-mode .moon-icon { display: none; }

        h1, h2.cyber-title {
            font-weight: bold; background: var(--title-graphic);
            background-size: 300% 100%; -webkit-background-clip: text; background-clip: text;
            animation: flowGradient 4s linear infinite;
        }
        body:not(.dark-mode) h1 { color: var(--primary-color); -webkit-background-clip: initial; background-clip: initial; }
        @keyframes flowGradient { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }
        
        .mode-card {
            padding: 20px; border: var(--card-border); border-radius: 12px;
            cursor: pointer; transition: all 0.2s ease; background-color: var(--bg-color); margin-bottom: 15px;
        }
        .mode-card:hover { border-color: var(--primary-color); background-color: var(--hover-bg); transform: translateY(-3px); }
        .mode-card:active { transform: translateY(3px) scale(0.97); }
        
        /* --- 修正後的 Submit 按鈕樣式 --- */
        .main-btn {
            width: 100%; padding: 18px; background-color: var(--primary-color);
            color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;
            transition: all 0.3s ease;
        }
        body.dark-mode .main-btn {
            background-color: #37474f; /* 工業淺灰色底 */
            color: #cfd8dc; /* 淺銀色文字 */
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        body.dark-mode .main-btn:hover {
            background-color: #455a64;
            box-shadow: 0 0 12px rgba(0, 242, 255, 0.3); /* 懸停時帶有微弱青色發光 */
            color: #ffffff;
        }
        .main-btn:active { transform: translateY(3px) scale(0.97); }

        .sub-btn {
            padding: 8px 18px; background: #fff; border-radius: 20px;
            border: 1.5px solid var(--primary-color); color: var(--primary-color); cursor: pointer; margin: 5px;
        }
        .sub-btn:hover { background-color: var(--primary-color); color: #fff; }

        .dialogue-box { background-color: var(--bg-color); padding: 25px; border-radius: 10px; text-align: left; margin: 20px 0; border: var(--card-border); border-left: 6px solid var(--primary-color); }
        .word-pool { display: flex; flex-wrap: wrap; gap: 12px; min-height: 80px; margin: 15px 0; padding: 15px; border: 2px dashed var(--secondary-color); border-radius: 8px; align-items: center; position: relative; }
        
        .word-card { 
            background-color: var(--accent-color); color: white; 
            padding: 12px 22px; border-radius: 8px; cursor: grab; 
            user-select: none; transition: all 0.2s ease;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
            border: 1.5px solid transparent;
        }
        body.dark-mode .word-card { border-color: rgba(0, 242, 255, 0.05); color: #b0e0e6; }
        .word-card:hover { transform: translateY(-2px); border-color: var(--primary-color); box-shadow: 0 0 10px var(--primary-color); color: white; }
        .word-card.dragging { opacity: 0.4; transform: scale(0.95); background-color: var(--secondary-color); }

        .drag-placeholder { border: 2px dashed var(--primary-color); background-color: var(--hover-bg); border-radius: 8px; transition: width 0.2s ease; }

        .hidden { display: none; }
        .report-box { text-align: left; background: #fff; padding: 25px; border-radius: 10px; border: 2px solid var(--primary-color); color: #333; line-height: 1.6; }
        body.dark-mode .report-box { background: #1a1a1a; color: #ddd; }
        .history-list-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; }
    </style>
</head>
<body>

<button id="theme-toggle" onclick="toggleTheme()">
    <svg class="moon-icon" width="24" height="24" viewBox="0 0 24 24"><path d="M12.1 22c-5.5 0-10-4.5-10-10 0-3.3 1.6-6.2 4.2-7.9.5-.3 1.1-.1 1.4.4.2.4.2.9-.1 1.3C6.7 7.1 6 8.5 6 10c0 3.3 2.7 6 6 6 1.5 0 2.9-.6 3.9-1.6.3-.3.8-.4 1.3-.1.5.2.7.8.4 1.3-1.7 2.6-4.6 4.2-7.9 4.2zm1-2c2.1 0 4.1-1.1 5.3-2.9C15.8 19.3 13.9 20 12 20c-4.4 0-8-3.6-8-8 0-1.9.7-3.8 1.9-5.3C4.1 7.9 3 9.9 3 12c0 4.9 4.1 9 9 9z"/></svg>
    <svg class="sun-icon" width="24" height="24" viewBox="0 0 24 24"><path d="M12 18c-3.3 0-6-2.7-6-6s2.7-6 6-6 6 2.7 6 6-2.7 6-6 6zm0-10c-2.2 0-4 1.8-4 4s1.8 4 4 4 4-1.8 4-4-1.8-4-4-4z"/></svg>
</button>

<div id="game-container">
    <div id="lang-screen">
        <h1 style="color: var(--primary-color);">Welcome / 歡迎</h1>
        <div class="mode-card" onclick="setLanguage('en')"><h2>English</h2></div>
        <div class="mode-card" onclick="setLanguage('zh')"><h2>中文</h2></div>
    </div>

    <div id="start-screen" class="hidden">
        <h1 id="ui-main-title">🚀 英語重組大挑戰</h1>
        <div class="mode-card" onclick="selectSystemMode('multi')">
            <h2 id="ui-mode-multi-title">🌌 星際挑戰賽</h2>
            <p id="ui-mode-multi-desc">自動同步 GitHub 官方題庫</p>
        </div>
        <div class="mode-card" onclick="selectSystemMode('single')">
            <h2 id="ui-mode-single-title">🛡️ 自主訓練營</h2>
            <p id="ui-mode-single-desc">使用 Excel 或 CSV 題庫</p>
        </div>
        <button class="main-btn" style="background-color: #673ab7;" onclick="showHistoryList()" id="ui-btn-history">📜 我的歷史戰報</button>
    </div>

    <div id="upload-screen" class="hidden">
        <h2 id="ui-upload-title">📂 上傳自定義題庫</h2>
        <input type="file" id="excel-file" accept=".xlsx, .xls, .csv">
        <br><br><button class="main-btn" onclick="location.reload()" id="ui-btn-back">返回</button>
    </div>

    <div id="mode-screen" class="hidden">
        <h2 id="ver-display">...</h2>
        <div class="mode-card" onclick="initGame('Practice Mode')"><h3 id="ui-opt-practice">📖 完整練習</h3></div>
        <div class="mode-card">
            <h3 id="ui-opt-challenge">🎯 針對性挑戰</h3>
            <div class="sub-options">
                <button class="sub-btn" onclick="initGame('Short Sentence')" id="ui-btn-short">短句</button>
                <button class="sub-btn" onclick="initGame('Mid Sentence')" id="ui-btn-mid">中階</button>
                <button class="sub-btn" onclick="initGame('Long Sentence')" id="ui-btn-long">長句</button>
            </div>
        </div>
        <div class="mode-card" onclick="initGame('Delta Challenge')"><h3 id="ui-opt-delta">🎲 神秘人 Delta 的挑戰</h3></div>
    </div>

    <div id="game-screen" class="hidden">
        <div style="display:flex; justify-content: space-between;"><span id="q-info"></span><span>⏱️ <b id="timer">0.0</b>s</span></div>
        <div class="dialogue-box"><b>Person A:</b> <div id="word-pool" class="word-pool"></div><b>Person B:</b> <span id="hint-text"></span></div>
        <button class="main-btn" onclick="checkAnswer()" id="ui-btn-submit">確認提交</button>
    </div>

    <div id="report-screen" class="hidden">
        <h1 class="cyber-title" id="ui-report-title">🏆 挑戰完成！</h1>
        <div class="report-box" id="report-content"></div>
        <button class="main-btn" onclick="location.reload()" id="ui-btn-home">回到主頁</button>
    </div>

    <div id="history-screen" class="hidden">
        <h1 id="ui-history-title">📜 戰報紀錄</h1>
        <div id="history-list"></div>
        <button class="main-btn" onclick="location.reload()" id="ui-btn-back2" style="background:#95a5a6">返回</button>
    </div>
</div>

<script>
    // --- 請修改為您的 GitHub 資訊 ---
    const GITHUB_USERNAME = "alexpgde"; 
    const REPO_NAME = "word-arrange";       

    const i18n = {
        zh: {
            mainTitle: "🚀 英語重組大挑戰", modeMulti: "🌌 星際挑戰賽", modeMultiDesc: "自動同步 GitHub 官方題庫",
            modeSingle: "🛡️ 自主訓練營", modeSingleDesc: "使用 Excel 或 CSV 題庫", btnHistory: "📜 我的歷史戰報",
            btnBack: "返回", btnSubmit: "確認提交", uploadTitle: "📂 上傳自定義題庫", optPractice: "📖 完整練習",
            optChallenge: "🎯 針對性挑戰", optDelta: "🎲 神秘人 Delta 的挑戰", btnShort: "短句高手",
            btnMid: "中階挑戰", btnLong: "長句精英", reportTitle: "🏆 挑戰完成！", btnHome: "回到主頁",
            historyTitle: "📜 最近 10 次戰報", promptName: "請輸入姓名：", promptError: "順序不對哦！",
            cooldown: "冷卻中，請稍後！", reportUser: "玩家", reportMode: "模式", reportTotal: "總時", reportSlow: "🚩 耗時題：", verText: "版本"
        },
        en: {
            mainTitle: "🚀 Sentence Scramble", modeMulti: "🌌 Interstellar Mission", modeMultiDesc: "Sync Official Library",
            modeSingle: "🛡️ Private Training", modeSingleDesc: "Upload Excel/CSV", btnHistory: "📜 My Training Logs",
            btnBack: "Back", btnSubmit: "Submit", uploadTitle: "📂 Upload Question Library", optPractice: "📖 Full Practice",
            optChallenge: "🎯 Targeted Challenge", optDelta: "🎲 Delta's Challenge", btnShort: "Short (Novice)",
            btnMid: "Mid (Pro)", btnLong: "Long (Elite)", reportTitle: "🏆 Mission Accomplished!", btnHome: "Home Screen",
            historyTitle: "📜 Recent 10 Missions", promptName: "Enter Your Name:", promptError: "Incorrect order!",
            cooldown: "Wait a bit.", reportUser: "Player", reportMode: "Mode", reportTotal: "Total Time", reportSlow: "🚩 Hardest:", verText: "Version"
        }
    };

    let lang = 'zh';
    function setLanguage(l) { lang = l; document.getElementById('lang-screen').classList.add('hidden'); document.getElementById('start-screen').classList.remove('hidden'); updateUI(); }
    function updateUI() {
        const t = i18n[lang];
        document.getElementById('ui-main-title').textContent = t.mainTitle;
        document.getElementById('ui-mode-multi-title').textContent = t.modeMulti;
        document.getElementById('ui-mode-multi-desc').textContent = t.modeMultiDesc;
        document.getElementById('ui-mode-single-title').textContent = t.modeSingle;
        document.getElementById('ui-mode-single-desc').textContent = t.modeSingleDesc;
        document.getElementById('ui-btn-history').textContent = t.btnHistory;
        document.getElementById('ui-upload-title').textContent = t.uploadTitle;
        document.getElementById('ui-btn-back').textContent = t.btnBack;
        document.getElementById('ui-btn-back2').textContent = t.btnBack;
        document.getElementById('ui-opt-practice').textContent = t.optPractice;
        document.getElementById('ui-opt-challenge').textContent = t.optChallenge;
        document.getElementById('ui-opt-delta').textContent = t.optDelta;
        document.getElementById('ui-btn-short').textContent = t.btnShort;
        document.getElementById('ui-btn-mid').textContent = t.btnMid;
        document.getElementById('ui-btn-long').textContent = t.btnLong;
        document.getElementById('ui-btn-submit').textContent = t.btnSubmit;
        document.getElementById('ui-report-title').textContent = t.reportTitle;
        document.getElementById('ui-btn-home').textContent = t.btnHome;
        document.getElementById('ui-history-title').textContent = t.historyTitle;
    }

    let groups = { easy: [], mid: [], hard: [] }, currentList = [], quizLogs = [], currentIndex = 0, correctWords = [], qStartTime, globalStartTime, timerInterval, currentVersion = "v1", excelName = "data.xlsx", playerName = "", selectedGameMode = "", lastThemeChange = 0;

    function toggleTheme() { if (Date.now() - lastThemeChange < 30000) return alert(i18n[lang].cooldown); document.body.classList.toggle('dark-mode'); lastThemeChange = Date.now(); }

    async function detectVersion() { try { const res = await fetch(`https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/`); const files = await res.json(); const excels = files.filter(f => f.name.startsWith('data') && f.name.endsWith('.xlsx')); if(excels.length > 0) { excels.sort((a,b) => b.name.localeCompare(a.name, undefined, {numeric:true})); excelName = excels[0].name; currentVersion = excelName.match(/_v(\d+)/) ? `v${excelName.match(/_v(\d+)/)[1]}` : "v1"; } } catch(e) {} document.getElementById('ver-display').textContent = `${i18n[lang].verText}: ${currentVersion}`; }

    window.selectSystemMode = async (m) => { playerName = prompt(i18n[lang].promptName) || (lang==='en'?"Adventurer":"冒險者"); document.getElementById('start-screen').classList.add('hidden'); if(m === 'multi') { await detectVersion(); const r = await fetch(excelName); processExcel(await r.arrayBuffer()); document.getElementById('mode-screen').classList.remove('hidden'); } else { document.getElementById('upload-screen').classList.remove('hidden'); } };

    function processExcel(buffer) { const wb = XLSX.read(buffer); const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header:"A"}); groups = { easy:[], mid:[], hard:[] }; data.forEach(r => { if(r.B && r.C) { const len = r.B.trim().split(/\s+/).length; if(len < 4) groups.easy.push(r); else if(len <= 6) groups.mid.push(r); else groups.hard.push(r); } }); if(document.getElementById('upload-screen').offsetParent !== null) document.getElementById('mode-screen').classList.remove('hidden'); }
    document.getElementById('excel-file').addEventListener('change', async(e) => processExcel(await e.target.files[0].arrayBuffer()));

    window.initGame = (m) => {
        selectedGameMode = m; const getRand = (arr, n) => [...arr].sort(() => 0.5 - Math.random()).slice(0, n);
        if(m.includes('Practice')) { currentList = [...groups.easy, ...groups.mid, ...groups.hard]; } 
        else if(m === 'Delta Challenge') {
            const nEasy = Math.floor(Math.random() * 2) + 1, nMid = Math.floor(Math.random() * 2) + 2, nHard = 10 - nEasy - nMid;
            currentList = [...getRand(groups.easy, nEasy), ...getRand(groups.mid, nMid), ...getRand(groups.hard, nHard)].sort(() => 0.5 - Math.random());
        } else {
            const pool = m.includes('Short') ? groups.easy : m.includes('Mid') ? groups.mid : groups.hard;
            currentList = getRand(pool, 5);
        }
        if(currentList.length === 0) return alert("題庫內容不足！");
        currentIndex = 0; quizLogs = []; document.getElementById('mode-screen').classList.add('hidden'); document.getElementById('game-screen').classList.remove('hidden'); globalStartTime = Date.now(); timerInterval = setInterval(() => { document.getElementById('timer').textContent = ((Date.now()-globalStartTime)/1000).toFixed(1); }, 100); loadQ();
    };

    function loadQ() {
        const d = currentList[currentIndex]; 
        document.getElementById('q-info').textContent = `${currentIndex+1} / ${currentList.length}`; 
        document.getElementById('hint-text').textContent = d.C; 
        correctWords = d.B.trim().split(/\s+/); 
        let shuf = [...correctWords].sort(()=>Math.random()-0.5); 
        const p = document.getElementById('word-pool'); p.innerHTML = ''; 
        shuf.forEach(w => { 
            const c = document.createElement('div'); 
            c.className='word-card'; 
            c.draggable=true; 
            c.textContent=w; 
            c.addEventListener('dragstart', handleDragStart);
            c.addEventListener('dragend', handleDragEnd);
            p.appendChild(c); 
        }); 
        qStartTime = Date.now(); 
    }

    let placeholder = document.createElement('div');
    placeholder.className = 'drag-placeholder';

    function handleDragStart(e) {
        this.classList.add('dragging');
        placeholder.style.width = this.offsetWidth + 'px';
        placeholder.style.height = this.offsetHeight + 'px';
    }

    function handleDragEnd(e) {
        this.classList.remove('dragging');
        if (placeholder.parentNode) {
            placeholder.parentNode.removeChild(placeholder);
        }
    }

    document.getElementById('word-pool').addEventListener('dragover', (e) => {
        e.preventDefault();
        const p = document.getElementById('word-pool');
        const draggingItem = document.querySelector('.dragging');
        const afterElement = getDragAfterElement(p, e.clientX);
        
        if (afterElement == null) {
            p.appendChild(placeholder);
            p.appendChild(draggingItem);
        } else {
            p.insertBefore(placeholder, afterElement);
            p.insertBefore(draggingItem, placeholder);
        }
    });

    function getDragAfterElement(container, x) {
        const draggableElements = [...container.querySelectorAll('.word-card:not(.dragging)')];
        return draggableElements.reduce((closest, child) => {
            const box = child.getBoundingClientRect();
            const offset = x - box.left - box.width / 2;
            if (offset < 0 && offset > closest.offset) {
                return { offset: offset, element: child };
            } else {
                return closest;
            }
        }, { offset: Number.NEGATIVE_INFINITY }).element;
    }

    window.checkAnswer = () => {
        if([...document.querySelectorAll('.word-card')].map(el=>el.textContent).join(' ') === correctWords.join(' ')) {
            quizLogs.push({ q: correctWords.join(' '), a: document.getElementById('hint-text').textContent, time: (Date.now()-qStartTime)/1000 });
            currentIndex++;
            if(currentIndex < currentList.length) loadQ();
            else generateReport();
        } else alert(i18n[lang].promptError);
    };

    function generateReport() { clearInterval(timerInterval); const total = (Date.now() - globalStartTime) / 1000; const report = { playerName, mode: selectedGameMode, version: currentVersion, total, date: new Date().toLocaleString(), slow: [...quizLogs].sort((a,b)=>b.time-a.time).slice(0,3) }; saveToLocal(report); displayReportUI(report); }
    function saveToLocal(d) { let h = JSON.parse(localStorage.getItem('quiz_history') || '[]'); h.unshift(d); if(h.length > 10) h = h.slice(0,10); localStorage.setItem('quiz_history', JSON.stringify(h)); }
    function displayReportUI(d) { const t = i18n[lang]; document.getElementById('game-screen').classList.add('hidden'); document.getElementById('report-screen').classList.remove('hidden'); let html = `<p>👤 ${t.reportUser}: ${d.playerName}</p><p>🧭 ${t.reportMode}: ${d.mode}</p><p>⏱️ ${t.reportTotal}: ${d.total.toFixed(1)}s</p><h3>${t.reportSlow}</h3>`; d.slow.forEach(s => html += `<div style="font-size:0.8rem; margin-bottom:5px; padding:10px; background:rgba(0,0,0,0.05);">${s.q} (${s.time.toFixed(1)}s)</div>`); document.getElementById('report-content').innerHTML = html; }
    window.showHistoryList = () => { document.getElementById('start-screen').classList.add('hidden'); document.getElementById('history-screen').classList.remove('hidden'); const h = JSON.parse(localStorage.getItem('quiz_history') || '[]'); const l = document.getElementById('history-list'); l.innerHTML = h.length ? "" : (lang==='zh'?"尚無紀錄":"No records."); h.forEach(item => { const div = document.createElement('div'); div.className = 'history-list-item'; div.innerHTML = `<span>${item.date}</span> <b>${item.total.toFixed(1)}s</b>`; l.appendChild(div); }); };
</script>
</body>
</html>
